name: localgovernment_project
description: A new Flutter project.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  http: ^1.6.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_messaging: ^16.1.3
  firebase_app_check: ^0.4.2
  flutter_local_notifications: ^19.5.0
  pin_code_fields: any
  webview_flutter: ^4.7.0
  flutter_dotenv: ^5.1.0
  encrypt: ^5.0.3
  sizer: ^3.1.3
  in_app_update: ^4.2.3
  in_app_review: ^2.0.9
  encrypted_shared_preferences: ^3.0.1
  shared_preferences: ^2.3.2
  animated_text_kit: ^4.2.2
  package_info_plus: ^9.0.0
  # flutter_downloader: ^1.11.8
  flutter_phoenix: ^1.1.1
  contained_tab_bar_view_with_custom_page_navigator: ^0.1.3
  badges: ^3.1.2
  toggle_switch: ^2.3.0
  google_fonts: ^6.2.1
  flutter_html: ^3.0.0
  flutter_slidable: ^4.0.3
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  record: ^6.2.0
  just_audio: ^0.9.36
  open_file: ^3.5.11
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/common_images/app_icon/new_app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/common_images/
    - assets/images/tenant_images/
    - assets/images/landlord_images/
    - assets/images/tenant_images/tenant_dashboard/
    - assets/images/tenant_images/tenant_contracts/
    - assets/images/vendor_images/
    - assets/icons/
    - assets/images/public_images/
    - .env
    - assets/images/common_images/app_icon/appStore.png
    - assets/images/common_images/app_icon/playStore.png
    - assets/images/common_images/pdf.png
    - assets/video/FAB_8.mp4
    - assets/video/WithMunciplity.mp4

  fonts:
    - family: GraphikRegular
      fonts:
        - asset: assets/fonts/GraphikRegular.ttf

    - family: GraphikSemibold
      fonts:
        - asset: assets/fonts/GraphikSemibold.ttf
    
    - family: TestFont
      fonts:
        - asset: assets/fonts/GraphikRegular.ttf